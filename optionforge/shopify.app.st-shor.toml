# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "67657980f19bcb445ef4a00335768582"
name = "st shor"
application_url = "https://st.apanjob.com"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2025-01"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  uri = "/webhooks/customers/data_request"
  compliance_topics = [ "customers/data_request" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/customers/redact"
  compliance_topics = [ "customers/redact" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/shop/redact"
  compliance_topics = [ "shop/redact" ]

  # orders/create + orders/updated removed: they carry protected customer data
  # and require PCD approval (Partner Dashboard → Protected Customer Data).
  # Re-add once approved. The app still reads orders via the Admin API.

  [[webhooks.subscriptions]]
  topics = [ "app_subscriptions/update" ]
  uri = "/webhooks/app_subscriptions/update"

  [[webhooks.subscriptions]]
  topics = [ "themes/publish" ]
  uri = "/webhooks/themes/publish"

[access_scopes]
scopes = "read_products,write_products,read_product_listings,read_orders,read_themes,write_themes,read_files,write_files,read_metaobject_definitions,write_metaobject_definitions,read_metaobjects,write_metaobjects,write_cart_transforms,read_translations,write_translations,read_locales,read_markets"
optional_scopes = [ "read_customers" ]
use_legacy_install_flow = false

[auth]
redirect_urls = [
  "https://st.apanjob.com/auth/callback",
  "https://st.apanjob.com/auth/shopify/callback",
  "https://st.apanjob.com/api/auth/callback"
]

[pos]
embedded = false

[app_proxy]
url = "https://st.apanjob.com/proxy"
subpath = "optionforge"
prefix = "apps"
